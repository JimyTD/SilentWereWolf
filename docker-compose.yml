version: '3.8'

services:
  # 应用服务（后端 + 前端静态文件）
  silentwerewolf:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silentwerewolf-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    networks:
      - silentwerewolf-network
    # 不对外暴露端口，仅通过 nginx 访问

  # Nginx 反向代理（WebSocket 支持）
  nginx:
    image: nginx:alpine
    container_name: silentwerewolf-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - silentwerewolf
    networks:
      - silentwerewolf-network

networks:
  silentwerewolf-network:
    driver: bridge
